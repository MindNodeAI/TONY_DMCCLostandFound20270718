<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龍華科大數商尋物站 - 失物招領公告 APP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col pb-16 md:pb-0">

    <!-- 主導覽列與頁首 -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.navigate('home')">
                <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white text-lg font-black shadow-md shadow-emerald-200">L</div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-slate-800 flex items-center gap-1">
                        數商尋物站 <span class="text-xs bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-normal">龍華科大</span>
                    </h1>
                    <p class="text-xs text-slate-500 font-medium hidden sm:block">數位行銷系 專屬失物招領平台</p>
                </div>
            </div>
            <div id="auth-container"></div>
        </div>
        <div class="border-t border-slate-100 bg-slate-50/50">
            <div class="max-w-6xl mx-auto px-4" id="nav-container"></div>
        </div>
    </header>

    <!-- 主內容渲染區塊 -->
    <main id="main-content" class="flex-grow bg-slate-50 min-h-[calc(100vh-150px)]"></main>

    <!-- 系統級提示彈窗 (Toast) -->
    <div id="system-toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-xl shadow-lg transition-all duration-300 transform translate-y-10 opacity-0 pointer-events-none z-50"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBtmjplYHKk1ktkYPuJcs-xqKFdNjjpjfs",
            authDomain: "k12-lhu-dmcb-lostfound.firebaseapp.com",
            projectId: "k12-lhu-dmcb-lostfound",
            storageBucket: "k12-lhu-dmcb-lostfound.firebasestorage.app",
            messagingSenderId: "990329211600",
            appId: "1:990329211600:web:2fda953d4c4f875ce7acd5",
            measurementId: "G-CTFCTNHQSC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // 🚀 新增 1：自動監聽使用者登入狀態 (解決重新整理或跳轉後狀態遺失的問題)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.state.user = user;
                const userEmail = user.email.toLowerCase();
                const adminEmails = ADMIN_EMAILS.map(email => email.toLowerCase());
                window.state.activeRole = adminEmails.includes(userEmail) ? 'admin' : 'student';
                window.render();
            }
        });

        // 🚀 新增 2：攔截手機版 Redirect 登入跳轉回來後的結果
        getRedirectResult(auth).then((result) => {
            if (result && result.user) {
                window.showToast('✅ 登入成功！', 'success');
            }
        }).catch((error) => {
            console.error("Redirect Login Error:", error);
            if (error.code !== 'auth/unauthorized-domain') {
                 window.showToast('登入過程發生異常，請使用 Safari 或 Chrome', 'error');
            }
        });

        // 全域狀態管理
        window.state = {
            user: null,
            activeRole: 'student', 
            currentView: 'home',
            selectedItemId: null,
            filters: { keyword: '', category: '', status: '' },
            foundItems: [],
            lostItems: [],
            toast: { show: false, message: "", type: "success" }
        };

        window.navigate = function(view, id = null) {
            window.state.currentView = view;
            window.state.selectedItemId = id;
            window.render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.showToast = function(message, type = 'success') {
            window.state.toast = { show: true, message, type };
            window.render();
            setTimeout(() => {
                window.state.toast.show = false;
                window.render();
            }, 3000);
        };

        // 👑 步驟一：在這裡設定你們系辦的「管理員 Email 名單」
        const ADMIN_EMAILS = [
            'mindnodeai@gmail.com',
            'liping@mail.lhu.edu.tw',
            'ishareping@gmail.com'
        ];

        window.logout = async function() {
            try {
                await signOut(auth);
                window.state.user = null;
                window.state.activeRole = 'student';
                window.showToast("👋 已成功登出");
                window.navigate('home');
            } catch (error) {
                console.error(error);
            }
        };

        window.loginWithGoogle = async function() {
            // 🛑 終極防呆機制：強制轉小寫，全面攔截任何大小寫的 LINE/IG/FB
            const ua = navigator.userAgent.toLowerCase();
            const isInAppBrowser = ua.includes("line") || ua.includes("instagram") || ua.includes("fban") || ua.includes("fbav");

            if (isInAppBrowser) {
                // 取代傳統 alert，使用客製化的高質感阻擋彈窗，引導使用者跳出 LINE
                const modalHtml = `
                    <div id="in-app-warning" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm p-4">
                        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl text-center">
                            <i class="fa-solid fa-triangle-exclamation text-5xl text-red-500 mb-4"></i>
                            <h3 class="text-xl font-black text-slate-800 mb-2">無法在 LINE 內登入</h3>
                            <p class="text-slate-600 text-sm leading-relaxed mb-6 text-left">
                                系統偵測到您正在使用 LINE 或 FB 內建瀏覽器，這會導致 Google 登入被阻擋而顯示白畫面！<br><br>
                                👉 請點擊右上角 (或右下角) 的選單 <b>⠇</b><br>
                                👉 選擇<b>「以預設瀏覽器開啟」</b>或<b>「在 Safari / Chrome 開啟」</b>再進行登入。
                            </p>
                            <button onclick="document.getElementById('in-app-warning').remove()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-lg hover:bg-slate-900 transition shadow-md">我知道了</button>
                        </div>
                    </div>
                `;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
                return; 
            }

            try {
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                
                // 📱 手機版與電腦版採用不同的登入策略，徹底解決手機白頻問題
                const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
                
                if (isMobile) {
                    window.showToast('正在跳轉至 Google 登入...', 'info');
                    await signInWithRedirect(auth, provider);
                } else {
                    await signInWithPopup(auth, provider);
                    // 電腦版 Popup 成功後，上方的 onAuthStateChanged 會自動接手處理
                    window.showToast('登入成功！', 'success');
                }
            } catch (error) {
                // 偵測是否為沙盒/未授權網域環境
                if (error.code === 'auth/unauthorized-domain') {
                    console.warn('沙盒環境：自動切換至測試管理員帳號...');
                    
                    window.state.user = {
                        uid: 'sandbox-admin-001',
                        email: 'ishareping@gmail.com',
                        displayName: '系辦管理員',
                        photoURL: 'https://ui-avatars.com/api/?name=Admin&background=333&color=fff' 
                    };
                    window.state.activeRole = 'admin';
                    
                    window.render();
                    window.showToast('🛠️ 沙盒模式：已用測試管理員登入', 'warning');
                } else {
                    console.error("登入發生錯誤:", error);
                    window.showToast("登入失敗，請確認網域已授權，或使用正常的瀏覽器開啟。", "error");
                }
            }
        };

        window.previewImage = function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('image-preview').src = e.target.result;
                    document.getElementById('preview-container').classList.remove('hidden');
                    document.getElementById('upload-placeholder').classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        };

        window.removeImage = function() {
            document.getElementById('itemImage').value = '';
            document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('upload-placeholder').classList.remove('hidden');
        };

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }

        window.submitNewItem = async function(event) {
            event.preventDefault();
            if (window.state.activeRole !== 'admin') {
                window.showToast('權限不足：僅管理員可新增拾獲物', 'error');
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 處理中...';
            btn.disabled = true;

            const formData = new FormData(event.target);
            const fileInput = document.getElementById('itemImage');
            let imageUrl = "https://placehold.co/500x300/e2e8f0/475569?text=LHU+Lost+Item";

            try {
                if (fileInput.files.length > 0) {
                    window.showToast("正在壓縮並上傳圖片...", "info");
                    imageUrl = await compressImage(fileInput.files[0]);
                }

                let finalCategory = formData.get('categorySelect');
                if (finalCategory === '其他') finalCategory = formData.get('customCategory') || '未分類';

                const newItem = {
                    title: formData.get('title'),
                    category: finalCategory,
                    location: formData.get('location'),
                    date: formData.get('date'),
                    description: formData.get('description'),
                    hiddenFeature: formData.get('hiddenFeature'),
                    status: "待認領",
                    reporter: window.state.user.displayName || "系辦人員",
                    createdAt: new Date().toISOString(),
                    expiresAt: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                    image: imageUrl,
                    claimRequests: []
                };

                const docRef = await addDoc(collection(db, "foundItems"), newItem);
                newItem.id = docRef.id;
                window.state.foundItems.unshift(newItem);
                window.showToast('✅ 成功寫入雲端資料庫！');
                window.navigate('home');
            } catch (error) {
                window.showToast('寫入失敗: 請檢查網路連線', 'error');
                btn.innerHTML = '寫入失敗';
                btn.disabled = false;
            }
        };

        window.deleteItem = async function(id) {
            if (window.state.activeRole !== 'admin') {
                window.showToast('權限不足', 'error');
                return;
            }
            try {
                await deleteDoc(doc(db, "foundItems", id));
                window.state.foundItems = window.state.foundItems.filter(item => item.id !== id);
                window.showToast('🗑️ 失物已成功從資料庫移除');
                window.navigate('home');
            } catch (error) {
                window.showToast('刪除失敗，請檢查權限', 'error');
            }
        };

        // 🚀 新增功能：物品生命週期終點 - 歸檔結案
        window.markItemClosed = async function(id) {
            if (window.state.activeRole !== 'admin') return;
            try {
                const itemRef = doc(db, "foundItems", id);
                await updateDoc(itemRef, { status: "已結案" });
                
                const item = window.state.foundItems.find(i => i.id === id);
                if (item) item.status = "已結案";
                
                window.showToast('📦 太棒了！物品已成功交付失主並歸檔結案！');
                window.navigate('home');
            } catch (error) {
                window.showToast('結案失敗', 'error');
            }
        };

        window.saveEditedItem = async function(event, id) {
            event.preventDefault();
            if (window.state.activeRole !== 'admin') return;

            const formData = new FormData(event.target);
            let finalCategory = formData.get('categorySelect');
            if (finalCategory === '其他') finalCategory = formData.get('customCategory') || '未分類';
            
            try {
                const itemRef = doc(db, "foundItems", id);
                await updateDoc(itemRef, {
                    title: formData.get('title'),
                    category: finalCategory,
                    location: formData.get('location'),
                    description: formData.get('description'),
                    hiddenFeature: formData.get('hiddenFeature')
                });
                
                const index = window.state.foundItems.findIndex(i => i.id === id);
                if (index !== -1) {
                    window.state.foundItems[index].title = formData.get('title');
                    window.state.foundItems[index].category = finalCategory;
                    window.state.foundItems[index].location = formData.get('location');
                    window.state.foundItems[index].description = formData.get('description');
                    window.state.foundItems[index].hiddenFeature = formData.get('hiddenFeature');
                }
                
                window.showToast('✅ 更新成功！');
                window.navigate('item_detail', id);
            } catch (error) {
                window.showToast('更新失敗', 'error');
            }
        };

        window.submitLostItem = async function(event) {
            event.preventDefault();
            if (!window.state.user) return;

            const formData = new FormData(event.target);
            const btn = document.getElementById('submit-lost-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 處理中...';
            btn.disabled = true;

            const newItem = {
                title: formData.get('title'),
                location: formData.get('location'),
                date: formData.get('date'),
                description: formData.get('description'),
                studentName: formData.get('studentName'),
                contact: formData.get('contact'),
                status: "協尋中",
                userId: window.state.user.uid,
                createdAt: new Date().toISOString()
            };

            try {
                const docRef = await addDoc(collection(db, "lostItems"), newItem);
                newItem.id = docRef.id;
                window.state.lostItems.unshift(newItem);
                window.showToast('✅ 協尋發布成功！希望盡快找回！');
                window.navigate('lost_list');
            } catch (error) {
                window.showToast('發布失敗', 'error');
                btn.innerHTML = '發布失敗';
                btn.disabled = false;
            }
        };

        window.markLostItemFound = async function(id) {
            try {
                const itemRef = doc(db, "lostItems", id);
                await updateDoc(itemRef, { status: "已尋獲" });
                const item = window.state.lostItems.find(i => i.id === id);
                if (item) item.status = "已尋獲";
                window.showToast('🎉 太棒了！物品已結案！');
                window.render();
            } catch (error) {
                window.showToast('結案失敗', 'error');
            }
        };

        // 🚀 新增功能：管理員可以直接刪除不當協尋
        window.deleteLostItem = async function(id) {
            if (window.state.activeRole !== 'admin') return;
            try {
                await deleteDoc(doc(db, "lostItems", id));
                window.state.lostItems = window.state.lostItems.filter(item => item.id !== id);
                window.showToast('🗑️ 協尋文章已刪除');
                window.render();
            } catch (error) {
                window.showToast('刪除失敗', 'error');
            }
        };

        window.handleClaimAction = async function(event, itemId, param3 = null, param4 = null) {
            if (event) event.preventDefault();
            const item = window.state.foundItems.find(i => i.id === itemId);
            if (!item) return;

            let action = 'submit';
            let reqId = null;

            if (param4) { 
                reqId = param3;
                action = param4;
            } else if (param3) { 
                action = param3;
            }

            try {
                const itemRef = doc(db, "foundItems", itemId);

                if (action === 'submit') {
                    const formData = new FormData(event.target);
                    const newRequest = {
                        requestId: 'REQ-' + Date.now(),
                        studentName: window.state.user.displayName,
                        contact: formData.get('contact'),
                        answer: formData.get('answer'),
                        status: '待審核',
                        createdAt: new Date().toISOString()
                    };
                    
                    if (!item.claimRequests) item.claimRequests = [];
                    item.claimRequests.push(newRequest);
                    item.status = "審核中";
                    
                    await updateDoc(itemRef, { claimRequests: item.claimRequests, status: "審核中" });
                    window.showToast('✅ 申請已送出！請靜候系辦通知。');
                    window.navigate('home');

                } else if (action === 'approve') {
                    if (window.state.activeRole !== 'admin') return;
                    item.status = "待領取";
                    const req = item.claimRequests.find(r => r.requestId === reqId);
                    if(req) req.status = '已核准';

                    await updateDoc(itemRef, { status: "待領取", claimRequests: item.claimRequests });
                    window.showToast('✅ 已核准！狀態更新為「待領取」');
                    window.render();

                } else if (action === 'reject') {
                    if (window.state.activeRole !== 'admin') return;
                    const req = item.claimRequests.find(r => r.requestId === reqId);
                    if(req) req.status = '已駁回';

                    const pendingCount = item.claimRequests.filter(r => r.status === '待審核').length;
                    if (pendingCount === 0) item.status = "待認領";

                    await updateDoc(itemRef, { status: item.status, claimRequests: item.claimRequests });
                    window.showToast('❌ 已駁回申請' + (pendingCount === 0 ? '，退回「待認領」' : ''));
                    window.render();
                }
            } catch (error) {
                window.showToast('操作失敗: 權限不足', 'error');
            }
        };

        window.updateFilters = function(type, value) {
            window.state.filters[type] = value;
            window.render();
        };

        function renderFoundList() {
            const { keyword, category, status } = window.state.filters;
            
            const uniqueCategories = ['3C電子', '證件錢包', '書籍文具', '生活用品'];
            window.state.foundItems.forEach(item => {
                if (item.category && !uniqueCategories.includes(item.category)) {
                    uniqueCategories.push(item.category);
                }
            });
            
            let categoryOptionsHTML = '<option value="">所有分類</option>';
            uniqueCategories.forEach(cat => {
                categoryOptionsHTML += `<option value="${cat}" ${category === cat ? 'selected' : ''}>${cat}</option>`;
            });

            // 🚀 核心優化：預設隱藏「已結案」物品，保持首頁清爽
            let filteredItems = window.state.foundItems.filter(item => {
                const matchKeyword = !keyword || item.title.includes(keyword) || item.location.includes(keyword) || item.description.includes(keyword);
                const matchCategory = !category || item.category === category;
                
                let matchStatus = false;
                if (status === '') {
                    // 預設狀況：顯示除了已結案之外的所有物品
                    matchStatus = (item.status !== '已結案');
                } else if (status === 'all') {
                    matchStatus = true;
                } else {
                    matchStatus = (item.status === status);
                }
                
                return matchKeyword && matchCategory && matchStatus;
            });

            let listHTML = `
            <div class="max-w-6xl mx-auto px-4 py-8">
                <!-- 系統公告與規範 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                    <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg shadow-sm">
                        <div class="flex items-start gap-3">
                            <i class="fa-solid fa-shield-halved text-blue-500 mt-1 text-lg"></i>
                            <div>
                                <h3 class="font-bold text-blue-800 mb-1">安全領取說明</h3>
                                <p class="text-sm text-blue-700 leading-relaxed">
                                    為防範冒領與隱私洩漏，貴重物品或證件之照片將遮蓋敏感資訊。申請認領時，需詳細描述特殊特徵（如鎖屏畫面、外殼貼紙），經系辦核對通過後，憑「認領驗證碼」至系辦 <span class="font-bold bg-blue-200 px-1 rounded">F402</span> 簽收領取。
                                </p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded-r-lg shadow-sm">
                        <div class="flex items-start gap-3">
                            <i class="fa-solid fa-leaf text-emerald-500 mt-1 text-lg"></i>
                            <div>
                                <h3 class="font-bold text-emerald-800 mb-1">保管期限與二手贈送機制</h3>
                                <p class="text-sm text-emerald-700 leading-relaxed">
                                    所有物品保管期限為 30 天。若期滿未認領，合乎轉贈標準之物品（如書籍、水壺等）將移入二手區。期末考週開放全系同學索取，落實綠色循環。
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 搜尋與篩選列 -->
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4 items-center">
                    <div class="relative flex-grow w-full">

        function renderAddLostItem() {
            if (!window.state.user) {
                return `<div class="py-16 text-center"><h3 class="text-xl font-bold text-slate-600 mb-4">發布協尋前，請先登入帳號喔！</h3><button onclick="window.loginWithGoogle()" class="bg-amber-500 text-white px-6 py-2 rounded-lg font-bold shadow-md">立即登入</button></div>`;
            }
            return `
            <div class="max-w-2xl mx-auto px-4 py-8">
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div class="bg-amber-500 px-6 py-4"><h2 class="text-white text-xl font-bold">發布遺失協尋</h2></div>
                    <div class="p-6">
                        <div class="bg-orange-50 border border-orange-200 text-orange-800 text-sm p-4 rounded-lg mb-6 flex gap-3 items-start shadow-sm">
                            <i class="fa-solid fa-lightbulb mt-0.5 text-lg"></i>
                            <div>
                                <b>📝 尋物填寫秘訣：</b> 
                                <p class="mt-1">描述越詳細，找回來的機率越大！請務必填寫專屬特徵（例如：角落有刮傷、掛著某某角色的吊飾、悠遊卡是什麼圖案的），這樣別人撿到才能立刻確認是你的物品喔！</p>
                            </div>
                        </div>
                        <form onsubmit="window.submitLostItem(event)" class="space-y-4">
                            <div><label class="block text-sm font-bold mb-1">物品名稱 *</label><input type="text" name="title" required class="w-full border rounded-lg px-4 py-2"></div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-sm font-bold mb-1">可能遺失地點 *</label><input type="text" name="location" required class="w-full border rounded-lg px-4 py-2"></div>
                                <div><label class="block text-sm font-bold mb-1">遺失日期 *</label><input type="date" name="date" required class="w-full border rounded-lg px-4 py-2"></div>
                            </div>
                            <div><label class="block text-sm font-bold mb-1">詳細特徵描述 *</label><textarea name="description" required rows="3" class="w-full border rounded-lg px-4 py-2"></textarea></div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-sm font-bold mb-1">您的姓名 *</label><input type="text" name="studentName" required class="w-full border rounded-lg px-4 py-2"></div>
                                <div><label class="block text-sm font-bold mb-1">聯絡電話 *</label><input type="text" name="contact" required class="w-full border rounded-lg px-4 py-2"></div>
                            </div>
                            <button type="submit" id="submit-lost-btn" class="w-full bg-amber-500 text-white font-bold py-3 rounded-lg shadow-md hover:bg-amber-600">發布協尋</button>
                        </form>
                    </div>
                </div>
            </div>`;
        }

        function renderAdminDashboard() {
            if (window.state.activeRole !== 'admin') return '';
            
            let auditsHTML = `
            <div class="max-w-6xl mx-auto px-4 py-8">
                <h2 class="text-2xl font-bold mb-6"><i class="fa-solid fa-shield-halved text-slate-700"></i> 管理員控制台</h2>
                
                <div class="bg-slate-100 border-l-4 border-slate-600 p-4 rounded-r-lg shadow-sm mb-6">
                    <div class="flex items-start gap-3">
                        <i class="fa-solid fa-clipboard-check text-slate-600 mt-1 text-lg"></i>
                        <div>
                            <h3 class="font-bold text-slate-800 mb-1">審核標準作業程序 (SOP)</h3>
                            <ul class="text-sm text-slate-700 space-y-1 list-disc list-inside">
                                <li>仔細比對申請人填寫的「隱藏特徵解答」，是否與建檔時設定的特徵相符。</li>
                                <li>若相符 ➔ 點擊「核准領取」，系統將通知學生憑學生證至系辦簽收。</li>
                                <li>若明顯不符或疑似冒領 ➔ 點擊「駁回」，物品狀態將自動退回「待認領區」。</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border p-6 mb-8">
                    <h3 class="font-bold text-lg mb-4 text-blue-700 border-b pb-2"><i class="fa-solid fa-gavel"></i> 認領申請審核中心</h3>
                    <div class="space-y-4">`;
            
            let hasAudits = false;
            window.state.foundItems.forEach(item => {
                if (item.status === '審核中' && item.claimRequests) {
                    item.claimRequests.filter(req => req.status === '待審核').forEach(req => {
                        hasAudits = true;
                        const isEco = req.answer.includes('♻️');
                        auditsHTML += `
                        <div class="${isEco ? 'bg-green-50 border-green-200' : 'bg-blue-50 border-blue-100'} border rounded-lg p-4 flex flex-col md:flex-row justify-between md:items-center gap-4">
                            <div>
                                <h4 class="font-bold text-slate-800">申請物品：${item.title}</h4>
                                <p class="text-sm text-slate-600 mt-1"><span class="font-semibold">${isEco ? '申請類別：' : '隱藏特徵解答：'}</span>${req.answer}</p>
                                <div class="text-xs text-slate-500 mt-2">申請人: ${req.studentName} | 聯絡方式: ${req.contact}</div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="window.handleClaimAction(null, '${item.id}', '${req.requestId}', 'reject')" class="px-4 py-2 bg-white border border-red-200 text-red-600 font-bold rounded shadow-sm hover:bg-red-50">駁回</button>
                                <button onclick="window.handleClaimAction(null, '${item.id}', '${req.requestId}', 'approve')" class="px-4 py-2 bg-blue-600 text-white font-bold rounded shadow-sm hover:bg-blue-700">核准領取</button>
                            </div>
                        </div>`;
                    });
                }
            });

            if (!hasAudits) auditsHTML += `<div class="text-center py-8 text-slate-500">目前沒有待審核的認領申請。</div>`;
            auditsHTML += `</div></div></div>`;
            return auditsHTML;
        }

        window.requestSecondHand = async function(event, itemId) {
            event.stopPropagation(); 
            if (!window.state.user) {
                window.showToast('請先登入才能申請索取喔！', 'warning');
                return;
            }
            
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 處理中...';
            btn.disabled = true;

            const item = window.state.foundItems.find(i => i.id === itemId);
            if (!item) return;

            try {
                const itemRef = doc(db, "foundItems", itemId);
                const newRequest = {
                    requestId: 'REQ-' + Date.now(),
                    studentName: window.state.user.displayName || "學生",
                    contact: window.state.user.email || "未提供信箱", 
                    answer: "【♻️永續專區 - 二手免費索取申請】", 
                    status: '待審核',
                    createdAt: new Date().toISOString()
                };
                
                let currentRequests = item.claimRequests || [];
                currentRequests.push(newRequest);
                
                await updateDoc(itemRef, { claimRequests: currentRequests, status: "審核中" });
                
                item.claimRequests = currentRequests;
                item.status = "審核中";
                
                window.showToast('✅ 二手索取申請已送出！請留意系辦審核通知。');
                window.render();
            } catch (error) {
                window.showToast('申請失敗，請檢查網路', 'error');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        function renderSecondHandList() {
            const today = new Date().toISOString().split('T')[0];
            
            let ecoItems = window.state.foundItems.filter(item => {
                return (item.expiresAt && item.expiresAt < today && item.status === '待認領') || item.status === '二手贈送';
            });

            let listHTML = `
            <div class="max-w-6xl mx-auto px-4 py-8">
                <div class="bg-gradient-to-r from-emerald-600 to-green-500 rounded-2xl p-6 text-white shadow-lg mb-8 relative overflow-hidden">
                    <i class="fa-solid fa-seedling absolute -right-4 -bottom-4 text-9xl opacity-20"></i>
                    <h2 class="text-2xl md:text-3xl font-black mb-3"><i class="fa-solid fa-recycle mr-2"></i>綠色永續！期末二手物贈送專區</h2>
                    <p class="text-green-50 text-sm md:text-base max-w-3xl leading-relaxed">
                        凡是保管超過 30 天且無人認領之一般物品，將依照行政章程解鎖、匿名化、並撥入二手贈送區。不論是否為遺失失主，全系師生皆可免費申請、重複利用，落實環境永續發展！
                    </p>
                </div>
            `;

            if (ecoItems.length === 0) {
                listHTML += `
                <div class="py-16 text-center bg-white rounded-xl shadow-sm border border-slate-200">
                    <i class="fa-solid fa-box-open text-6xl text-slate-300 mb-4"></i>
                    <h3 class="text-xl font-bold text-slate-600 mb-2">目前沒有可供索取的二手物品</h3>
                    <p class="text-slate-500">這代表近期遺失的物品都已經順利回到失主身邊囉！</p>
                </div></div>`;
                return listHTML;
            }

            listHTML += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">`;
            ecoItems.forEach(item => {
                listHTML += `
                <div class="bg-white rounded-xl shadow-sm border border-green-200 overflow-hidden hover:shadow-lg transition flex flex-col h-full group">
                    <div class="h-48 overflow-hidden relative bg-slate-100">
                        <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        <div class="absolute top-3 right-3 px-3 py-1 rounded-full text-xs font-bold shadow-sm bg-green-500 text-white"><i class="fa-solid fa-gift"></i> 免費索取</div>
                    </div>
                    <div class="p-4 flex-grow flex flex-col">
                        <h3 class="font-bold text-lg text-slate-800 mb-1 line-clamp-1">${item.title}</h3>
                        <p class="text-slate-500 text-sm mb-3"><i class="fa-solid fa-tag"></i> 原分類: ${item.category}</p>
                        <button onclick="window.requestSecondHand(event, '${item.id}')" class="mt-auto w-full bg-green-50 hover:bg-green-600 text-green-700 hover:text-white font-bold py-2.5 rounded-lg transition duration-300 border border-green-200 shadow-sm flex justify-center items-center gap-2">
                            <i class="fa-solid fa-hand-holding-heart"></i> 立即登記索取
                        </button>
                    </div>
                </div>
                `;
            });

            listHTML += `</div></div>`;
            return listHTML;
        }

        function renderNavigation() {
            const isAdmin = window.state.activeRole === 'admin';
            let html = `<div class="flex gap-1 md:gap-4 overflow-x-auto no-scrollbar py-2">
                <button onclick="window.navigate('home')" class="whitespace-nowrap px-4 py-2 rounded-lg font-bold transition ${['home','item_detail'].includes(window.state.currentView) ? 'bg-emerald-100 text-emerald-800' : 'text-slate-500 hover:bg-slate-100'}">尋找失物</button>
                <button onclick="window.navigate('lost_list')" class="whitespace-nowrap px-4 py-2 rounded-lg font-bold transition ${['lost_list','add_lost'].includes(window.state.currentView) ? 'bg-amber-100 text-amber-800' : 'text-slate-500 hover:bg-slate-100'}">遺失協尋</button>
                <button onclick="window.navigate('second_hand')" class="whitespace-nowrap px-4 py-2 rounded-lg font-bold transition ${window.state.currentView === 'second_hand' ? 'bg-green-100 text-green-800' : 'text-slate-500 hover:bg-slate-100'}"><i class="fa-solid fa-recycle"></i> 二手贈送</button>
            `;
            if (isAdmin) {
                html += `
                <button onclick="window.navigate('add_item')" class="whitespace-nowrap px-4 py-2 rounded-lg font-bold transition ${window.state.currentView === 'add_item' ? 'bg-emerald-100 text-emerald-800' : 'text-slate-500 hover:bg-slate-100'}">新增拾獲物</button>
                <button onclick="window.navigate('admin_dashboard')" class="whitespace-nowrap px-4 py-2 rounded-lg font-bold transition ${['admin_dashboard','edit_item'].includes(window.state.currentView) ? 'bg-slate-800 text-white' : 'text-slate-500 hover:bg-slate-100'}">資料庫管理</button>`;
            }
            html += `</div>`;
            return html;
        }

        window.render = function() {
            const main = document.getElementById('main-content');
            const auth = document.getElementById('auth-container');
            
            if (window.state.user) {
                auth.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="text-right hidden sm:block"><div class="text-sm font-bold">${window.state.user.displayName}</div></div>
                        <img src="${window.state.user.photoURL}" class="w-8 h-8 rounded-full border">
                        <button onclick="window.logout()" class="text-slate-400 hover:text-red-500 bg-slate-100 p-2 rounded-lg"><i class="fa-solid fa-right-from-bracket"></i></button>
                    </div>`;
            } else {
                auth.innerHTML = `<button onclick="window.loginWithGoogle()" class="bg-white border text-slate-700 font-bold py-2 px-4 rounded-lg shadow-sm text-sm hover:bg-slate-50 transition">使用 Google 登入</button>`;
            }

            document.getElementById('nav-container').innerHTML = renderNavigation();

            const views = {
                'home': renderFoundList,
                'add_item': renderAddItem,
                'item_detail': renderItemDetail,
                'admin_dashboard': renderAdminDashboard,
                'edit_item': renderEditItem,
                'lost_list': renderLostList,
                'add_lost': renderAddLostItem,
                'second_hand': renderSecondHandList
            };
            main.innerHTML = (views[window.state.currentView] || renderFoundList)();

            const toastEl = document.getElementById('system-toast');
            if (window.state.toast.show) {
                toastEl.className = `fixed bottom-4 right-4 px-6 py-3 rounded-xl shadow-lg text-white font-bold transition-all duration-300 transform translate-y-0 opacity-100 z-50 ${window.state.toast.type === 'error' ? 'bg-red-500' : window.state.toast.type === 'warning' ? 'bg-amber-500' : window.state.toast.type === 'info' ? 'bg-blue-500' : 'bg-emerald-600'}`;
                toastEl.innerHTML = window.state.toast.message;
            } else {
                toastEl.className = "fixed bottom-4 right-4 px-6 py-3 rounded-xl transition-all duration-300 transform translate-y-10 opacity-0 pointer-events-none z-50";
            }
        };

        window.loadDataFromCloud = async function() {
            try {
                const foundSnapshot = await getDocs(collection(db, "foundItems"));
                const foundData = [];
                foundSnapshot.forEach((doc) => { foundData.push({ id: doc.id, ...doc.data() }); });
                foundData.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
                window.state.foundItems = foundData;

                const lostSnapshot = await getDocs(collection(db, "lostItems"));
                const lostData = [];
                lostSnapshot.forEach((doc) => { lostData.push({ id: doc.id, ...doc.data() }); });
                lostData.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
                window.state.lostItems = lostData;

                window.render();
            } catch (error) {
                console.error("載入資料失敗:", error);
                window.showToast("無法載入雲端資料，請檢查網路連線", "error");
            }
        };

        window.onload = function() {
            window.render();
            window.loadDataFromCloud();
        };
    </script>
</body>
</html>
